<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="coin-face" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="35%" stop-color="#d4a034"/>
      <stop offset="70%" stop-color="#c08a28"/>
      <stop offset="100%" stop-color="#a07020"/>
    </linearGradient>
    <linearGradient id="coin-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="50%" stop-color="#b8862a"/>
      <stop offset="100%" stop-color="#f0c040"/>
    </linearGradient>
    <linearGradient id="text-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a24"/>
      <stop offset="100%" stop-color="#0d2014"/>
    </linearGradient>
    <filter id="inner-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="0" dy="1" result="offset"/>
      <feComposite in="SourceGraphic" in2="offset" operator="over"/>
    </filter>
  </defs>

  <!-- Coin shadow -->
  <ellipse cx="33" cy="34" rx="27" ry="27" fill="rgba(0,0,0,0.3)"/>

  <!-- Coin edge (3D rim) -->
  <circle cx="32" cy="32" r="28" fill="url(#coin-rim)"/>

  <!-- Coin face -->
  <circle cx="32" cy="32" r="25" fill="url(#coin-face)"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#a07020" stroke-width="0.8" opacity="0.6"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#c09030" stroke-width="0.5" opacity="0.4"/>

  <!-- Highlight arc (top shine) -->
  <path d="M 16 22 A 20 20 0 0 1 48 22" fill="none" stroke="rgba(255,255,220,0.3)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 13 text - tight kerning, bold serif -->
  <text x="31" y="41" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="26" letter-spacing="-3" fill="url(#text-fill)">13</text>

  <!-- Subtle text stroke for definition -->
  <text x="31" y="41" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="26" letter-spacing="-3" fill="none" stroke="#a07020" stroke-width="0.3" opacity="0.5">13</text>

  <!-- Small decorative dots (like coin edge details) -->
  <circle cx="32" cy="8" r="1" fill="#c09030" opacity="0.5"/>
  <circle cx="32" cy="56" r="1" fill="#a07020" opacity="0.5"/>
  <circle cx="8" cy="32" r="1" fill="#c09030" opacity="0.5"/>
  <circle cx="56" cy="32" r="1" fill="#a07020" opacity="0.5"/>
</svg>
